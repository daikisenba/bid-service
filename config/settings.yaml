# bid-service 設定ファイル
# 秘匿情報(サービスアカウントJSON)は環境変数(GitHub Secrets)側に置き、
# ここには書かない。スプレッドシートIDは秘匿情報として扱わない(共有権限で保護する)。

google:
  # 顧客マスタスプレッドシート(タブ: 顧客マスタ / 条件プロファイル / 実行ログ)
  customer_master_sheet_id: "1PSjN5cWo-4XD4zPAG0teevEj2OKIipCXG8eIRawk-7Q"
  customer_master_tab: "顧客マスタ"
  profile_tab: "条件プロファイル"
  admin_log_tab: "実行ログ"

search:
  api_base_url: "https://www.kkj.go.jp/api/"
  # 直近何日分の公告(CFT_Issue_Date)を対象にするか
  lookback_days: 7
  # kkj.go.jp API の Count パラメータ上限(仕様上の最大は1000)
  max_count: 1000
  # HTTPタイムアウト(秒)
  timeout_seconds: 20

matching:
  # この点数(0-100)以上をレコメンド対象とする
  score_threshold: 60
  # 1回の実行で1顧客に配信する最大件数(スコア上位から)。レコメンドの価値は
  # 絞り込みにあるため、初回実行やlookback_daysが長い場合の大量マッチを抑える
  max_recommendations_per_run: 20
  weights:
    keyword: 50
    region: 20
    qualification: 20
    price: 10
  # ProjectDescription からの予定価格ベストエフォート抽出用正規表現
  # (kkj.go.jp APIは予定価格を構造化データとして提供していないため、
  #  抽出できない場合は「要確認」として価格スコアを加点しない)
  price_regex_patterns:
    - "予定価格[^0-9]{0,10}([0-9,]+)\\s*円"
    - "契約金額[^0-9]{0,10}([0-9,]+)\\s*円"

email:
  # フェーズ1は自動送信禁止のため、常にこの管理者アドレス宛に送る。
  # 送信はGmail API(サービスアカウント+ドメイン全体の委任)。from_address は
  # 委任でimpersonateする実在のWorkspaceユーザー(この人として送る)。
  admin_address: "d.senba@souki-cp.co.jp"
  from_address: "d.senba@souki-cp.co.jp"
  # Stripeカスタマーポータル(解約・カード変更)。フッターにリンクとして表示される。
  # ※配信条件の変更は「メール返信」方式(フッターに固定の案内文を常時出力)のため専用URLなし
  customer_portal_url: "https://billing.stripe.com/p/login/14AaER5s3cOk2FM4cX67S00"

company:
  name: "株式会社想樹"

awards:
  # 参考落札相場(調達ポータル 落札実績オープンデータ)。無効化すると相場欄は空になる
  enabled: true
  api_base_url: "https://api.p-portal.go.jp/pps-web-biz/UAB03/OAB0301"
  # 今年度を含め何年度分をさかのぼって相場計算に使うか(2 = 今年度+前年度)
  fiscal_year_lookback: 2
  timeout_seconds: 60
